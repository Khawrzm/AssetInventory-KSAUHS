name: Logistics-Zero Sovereign Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Compile C++ Sovereign Engine
        run: |
          g++ -shared -o src/Engine/sovereign_engine.dll src/Engine/sovereign_engine.cpp -O3 -std=c++20

      - name: Publish .NET 8 WinForms
        run: |
          dotnet publish AssetInventoryNode.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v3.0.0-${{ github.run_number }}
          files: |
            bin/Release/net8.0/win-x64/publish/AssetInventory.exe
            src/Engine/sovereign_engine.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
